# .github/workflows/validate-pr.yml
# Verifica que el PR template esté correctamente llenado antes de permitir review.

name: Validar PR Template

on:
  pull_request:
    branches:
      - develop
    types: [opened, edited, synchronize, reopened]

jobs:
  validar-template:
    name: Verificar que el formulario esté completo
    runs-on: ubuntu-latest
    steps:
      - name: Revisar cuerpo del PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            const errores = [];

            // 1. Descripción no debe estar vacía ni contener solo el placeholder
            if (!body.includes('## 📋 Descripción del cambio')) {
              errores.push('Falta la sección "Descripción del cambio".');
            } else {
              const desc = body.split('## 🔧')[0]
                               .replace('## 📋 Descripción del cambio', '')
                               .replace(/<!--.*?-->/gs, '')
                               .trim();
              if (desc.length < 20) {
                errores.push('La descripción es muy corta (mínimo 20 caracteres). Explica qué hiciste y por qué.');
              }
            }

            // 2. Al menos un tipo de cambio marcado
            const tiposMarcados = (body.match(/- \[x\]/gi) || []).length;
            if (tiposMarcados === 0) {
              errores.push('Marca al menos un tipo de cambio en la sección "Tipo de cambio".');
            }

            // 3. Sección de pruebas no vacía
            if (!body.includes('## 🧪 ¿Cómo probaste los cambios?')) {
              errores.push('Falta la sección "¿Cómo probaste los cambios?".');
            } else {
              const pruebas = body.split('## 📸')[0]
                                   .split('## 🧪 ¿Cómo probaste los cambios?')[1]
                                   .replace(/<!--.*?-->/gs, '')
                                   .trim();
              if (pruebas.length < 10) {
                errores.push('Describe cómo probaste tus cambios (sección "¿Cómo probaste?").');
              }
            }

            // 4. Checklist: al menos los primeros 2 items deben estar marcados
            const checklistSection = body.split('## ✅ Checklist')[1] || '';
            const checksDone = (checklistSection.match(/- \[x\]/gi) || []).length;
            if (checksDone < 2) {
              errores.push('Completa al menos 2 items del checklist antes de pedir review.');
            }

            if (errores.length > 0) {
              const mensaje = [
                '## ❌ El PR template está incompleto\n',
                'Por favor corrige lo siguiente antes de continuar:\n',
                ...errores.map(e => `- ${e}`),
                '\n---',
                '_Este check corre automáticamente cada vez que editas el PR._'
              ].join('\n');

              core.setFailed(mensaje);
            } else {
              console.log('✅ PR template validado correctamente.');
            }